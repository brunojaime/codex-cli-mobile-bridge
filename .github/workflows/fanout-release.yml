name: Fanout Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: Shared component configured in app_release_associations.json.
        required: true
        default: codex_app_updater
      dependency_ref:
        description: Git ref/tag for the shared component dependency.
        required: true
      app:
        description: Optional sourceApp to limit the fanout.
        required: false
        default: ""
      mode:
        description: Dry-run by default. execute-and-push can publish target app releases.
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - execute
          - execute-and-push

permissions:
  contents: read

jobs:
  fanout:
    runs-on: ubuntu-latest
    steps:
      - name: Check out bridge
        uses: actions/checkout@v6
        with:
          path: codex-cli-mobile-bridge

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check out associated app repos
        working-directory: codex-cli-mobile-bridge
        env:
          FANOUT_TOKEN: ${{ secrets.FANOUT_RELEASE_GITHUB_TOKEN || github.token }}
          COMPONENT: ${{ inputs.component }}
          APP_FILTER: ${{ inputs.app }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          config = json.loads(
              (root / "backend/app/infrastructure/config/app_release_associations.json").read_text()
          )
          component = config[os.environ["COMPONENT"]]
          app_filter = os.environ.get("APP_FILTER", "").strip()
          token = os.environ.get("FANOUT_TOKEN", "").strip()
          for app in component["apps"]:
              if app_filter and app["sourceApp"] != app_filter:
                  continue
              destination = (root / app["localPath"]).resolve()
              destination.parent.mkdir(parents=True, exist_ok=True)
              repo = app["repo"]
              url = f"https://github.com/{repo}.git"
              if token:
                  url = f"https://x-access-token:{token}@github.com/{repo}.git"
              subprocess.run(["git", "clone", url, str(destination)], check=True)
          PY

      - name: Run fanout release
        working-directory: codex-cli-mobile-bridge
        env:
          COMPONENT: ${{ inputs.component }}
          DEPENDENCY_REF: ${{ inputs.dependency_ref }}
          APP_FILTER: ${{ inputs.app }}
          MODE: ${{ inputs.mode }}
        run: |
          args=(
            --component "$COMPONENT"
            --dependency-ref "$DEPENDENCY_REF"
            --json
          )
          if [[ -n "$APP_FILTER" ]]; then
            args+=(--app "$APP_FILTER")
          fi
          case "$MODE" in
            dry-run)
              args+=(--dry-run)
              ;;
            execute)
              args+=(--execute)
              ;;
            execute-and-push)
              args+=(--execute --push)
              ;;
            *)
              echo "Unsupported mode: $MODE" >&2
              exit 1
              ;;
          esac
          python3 scripts/release_associated_apps.py "${args[@]}"
