  evidence:
    - frontend/mobile_app/lib/src/models/slash_command.dart defines the slash command model, action kinds, contextual provider interface, default global provider, New Project provider, slash-token parser, filtering, and availability guards.
    - frontend/mobile_app/lib/src/screens/chat_screen.dart renders the palette from provider output and dispatches insertText, sendMessage, openPanel, route, backend, callback, and disabled actions through one switch.
    - The mobile composer registers global commands including /new-project, /status, /review, /feedback, /compact, /diff, /apps, /workbench, disabled guarded commands, and New Project contextual commands.
    - /apps opens the existing installable apps sheet; /workbench opens the existing Codex tools/Workbench-capable panel and both are guarded when no active backend is available.
    - frontend/mobile_app/test/slash_command_model_test.dart covers command parsing, filtering, contextual providers, and availability guards.
    - frontend/mobile_app/test/slash_command_palette_test.dart covers palette filtering, disabled-command safety, /new-project callback dispatch, /apps and /workbench panel dispatch, unavailable panel commands, and normal slash-containing message send behavior.
    - Android release android-v1.0.0-build.88 points at the current HEAD that contains the slash command palette code and was published with APK assets on 2026-07-09.
