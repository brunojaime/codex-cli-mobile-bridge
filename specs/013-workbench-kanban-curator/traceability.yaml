spec_id: 013-workbench-kanban-curator
status: complete
requirements:
  R-001-kanban-domain-contract:
    acceptance_criteria:
      - Stable scope, board, column, card, evidence, and history payloads exist.
      - Confirmed task state is separated from inferred observer evidence.
      - A scope index contract lists workspace, spec, Project Factory, and generated workspace scopes.
    tasks:
