      - packages/codex_bridge_workbench/lib/src/widgets/sdd_explorer_panel.dart
      - packages/codex_bridge_workbench/test/codex_bridge_workbench_test.dart
  R-006-validation:
    acceptance_criteria:
      - Backend projection/API and Flutter UI states are covered by regression tests.
      - New Project continuity is covered without changing Generator/Reviewer behavior.
      - Scope index and UI request parameter preservation are covered for spec and job scopes.
