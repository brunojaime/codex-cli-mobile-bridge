      - T009
      - T010
      - T011
      - T012
      - T035
      - T037
    implementation:
      - backend/app/application/services/sdd_workbench_kanban_service.py
      - tests/test_sdd_workbench_kanban.py
  R-003-passive-run-observer:
    acceptance_criteria:
      - Project Factory drafts/jobs, run artifacts, JSONL tails, generated workspace mapping, validation outcomes, and reviewer findings are observed read-only.
      - Generator and Reviewer behavior remains unchanged.
      - Live project creation can be viewed through reusable draft/job scopes before the generated workspace exists.
    tasks:
      - T013
      - T014
      - T015
      - T016
      - T017
      - T018
      - T019
      - T040
    implementation:
      - backend/app/application/services/sdd_workbench_kanban_service.py
      - backend/app/container.py
      - tests/test_sdd_workbench_kanban.py
  R-004-curator-history:
    acceptance_criteria:
      - Curator input envelope is read-only and history is append-only with evidence-hash dedupe.
      - Latest update, history list, and history detail APIs are available.
    tasks:
      - T020
      - T021
      - T022
      - T023
      - T024
    implementation:
      - backend/app/application/services/sdd_workbench_kanban_service.py
      - backend/app/api/routes.py
      - tests/test_sdd_workbench_kanban.py
  R-005-workbench-kanban-ui:
    acceptance_criteria:
      - Workbench has a Kanban tab with responsive board, latest update, history, clear states, and compact overview card.
      - The Kanban tab can switch between workspace, spec, Project Factory, and generated workspace scopes, preserving the selected scope on refresh and polling.
      - The initial selector value always matches the board request, including Project Factory-first scope ordering and scope-index fallback.
    tasks:
      - T025
      - T026
      - T027
      - T028
      - T029
      - T030
      - T038
      - T041
      - T043
    implementation:
