      - backend/app/api/schemas.py
      - backend/app/api/routes.py
  R-002-deterministic-sdd-projection:
    acceptance_criteria:
      - SDD tasks, tree plans, metadata, phases, ordering, deltas, and cache are deterministic.
      - Projection state is stored outside SDD artifacts.
      - Workbench `done`, `completed`, and `complete` states all render as Done in task and phase cards.
      - Spec-scoped boards do not include workspace observer or Project Factory cards unless those scopes are explicit.
