requirements:
  R-001-kanban-domain-contract:
    acceptance_criteria:
      - Stable scope, board, column, card, evidence, and history payloads exist.
      - Confirmed task state is separated from inferred observer evidence.
    tasks:
      - T001
      - T002
      - T003
      - T004
      - T005
