acceptance_criteria:
  AC-001: Backend exposes environment identity and capabilities without prompt text.
  AC-002: PROD normal sessions cannot mutate Bridge code or access DEV internals.
  AC-003: Slash/action loads handoff context only temporarily.
  AC-004: Slash/action can enqueue only and has no file, command, restart, deploy, or DEV-agent permissions.
  AC-005: DEV backlog claims are exclusive and idempotent.
  AC-006: Handoffs materialize into DEV specs without breaking SDD lifecycle metadata.
  AC-007: Every DEV chat is bound to exactly one stage, branch, and worktree.
  AC-008: Branch/worktree mismatches block execution before commands run.
  AC-009: DEV stage runs use existing Generator/Reviewer auto-chain.
  AC-010: Final run evidence includes changed files, tests, risks, and user validation checklist.
  AC-011: dev/main integration is serialized.
  AC-012: Merge conflicts or failed validation leave dev/main unchanged and report exact blockers.
  AC-013: Promotion tool accepts validated parameters only.
  AC-014: Active PROD jobs, failed tests, missing approval, or invalid release config block promotion.
  AC-015: DEV and PROD apps have distinct labels, badges, colors, API URLs, updater channels, and release metadata.
  AC-016: Existing CODEX DEV developer-mode signal is not repurposed.
  AC-017: End-to-end dry-run covers handoff, backlog, stage, merge, and promotion.
  AC-018: Rollout can be enabled for DEV first and PROD handoff later.
  AC-019: Every DEV stage has its own backend URL, port, data dir, logs dir, PID file, env file, and health state.
  AC-020: Restarting or failing one stage backend does not affect another active stage backend or chat.
  AC-021: A prepared PROD backend update applies automatically only when no active job or pending agent-chain follow-up exists.
  AC-022: While PROD is busy, the frontend shows a persistent waiting-for-update notice with an explicit force action.
  AC-023: After a successful PROD backend update, the updated/restarted notice remains until the user acknowledges it.

implementation:
