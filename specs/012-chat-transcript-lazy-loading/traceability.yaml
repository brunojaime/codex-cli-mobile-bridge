  evidence:
    - backend/app/application/services/message_service.py exposes get_transcript_window with latest-user anchoring, stable encoded cursors, older-page loading, and explicit full transcript mode.
    - backend repository implementations expose list_messages_before, list_recent_messages, and latest_user_message for in-memory and SQLite stores.
    - backend/app/api/routes.py accepts before, limit, and transcript query params on GET /sessions/{session_id} and returns transcript_window metadata.
    - frontend/mobile_app/lib/src/models/session_detail.dart and services/api_client.dart parse transcript windows and request window/full transcript modes.
    - frontend/mobile_app/lib/src/state/chat_controller.dart prepends older pages, deduplicates messages, and preserves current session metadata while merging transcript windows.
    - frontend/mobile_app/lib/src/screens/chat_screen.dart lazy-loads older messages near the top, preserves scroll offset, and renders loading/retry/exhausted history affordances.
    - tests/test_session_management.py covers anchor selection, cursor pagination, tie-breaking, and the full-transcript escape hatch.
    - frontend/mobile_app/test/chat_transcript_lazy_loading_test.dart covers model/API parsing, older-page request params, controller prepend, dedupe, and partial-window state.
