spec_id: 015-project-factory-preview-hardening
status: implemented
requirements:
  R-001-workbench-boundary:
    acceptance_criteria:
      - Generated product apps do not expose Workbench as product navigation, routes, labels, or product RBAC permissions.
      - Bridge Workbench can still discover generated project SDD artifacts.
    tasks:
      - T001
      - T002
      - T003
      - T004
      - T005
      - T006
      - T007
    implementation:
      - backend/app/application/services/project_factory_generator_service.py
      - backend/app/application/services/sdd_workbench_view_service.py
      - frontend/mobile_app/lib/src/screens/workbench_screen.dart
      - tests/test_project_factory_generator_service.py
    evidence:
      - ".venv/bin/pytest -q tests/test_project_factory_generator_service.py tests/test_web_preview_deploy_service.py tests/test_web_preview_invite_service.py"
      - ".venv/bin/pytest -q tests/test_sdd_workbench_view.py tests/test_project_factory_job_runner.py"
  R-002-invite-first-access:
    acceptance_criteria:
      - Invite links auto-consume URL tokens without showing a token/link input.
      - First access creates a password with confirmation.
      - Logout and re-entry use normal email/password login.
      - Used invites cannot be accepted twice but can refresh preview access while valid.
    tasks:
      - T008
      - T009
      - T010
      - T011
      - T012
      - T013
      - T014
      - T015
      - T016
      - T017
    implementation:
      - backend/app/application/services/project_factory_generator_service.py
      - backend/app/application/services/web_preview_invite_service.py
      - tests/test_web_preview_invite_service.py
    evidence:
      - ".venv/bin/pytest -q tests/test_project_factory_generator_service.py tests/test_web_preview_invite_service.py"
  R-003-cloudflare-preview-runtime:
    acceptance_criteria:
      - Protected preview routing is owned by the Worker and does not rely on Cloudflare Assets SPA fallback.
      - Preview shell and non-hashed boot assets cannot be cached stale.
      - Browser smoke tests prove the deployed preview renders nonblank.
    tasks:
      - T018
      - T019
      - T020
      - T021
      - T022
      - T023
      - T024
      - T025
      - T026
      - T027
      - T028
