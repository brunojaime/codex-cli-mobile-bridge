      - backend/app/application/services/web_preview_deploy_service.py
      - backend/app/application/services/project_factory_generator_service.py
      - tests/test_web_preview_deploy_service.py
      - tests/test_project_factory_generator_service.py
    evidence:
      - ".venv/bin/pytest -q tests/test_project_factory_generator_service.py tests/test_web_preview_deploy_service.py tests/test_web_preview_invite_service.py tests/test_cloudflare_preview_doctor.py"
      - "Generated project scripts/validate_web_preview.sh passed with ES module Worker harness and /api/admin/domains route coverage."
  R-004-cloudflare-email-delivery:
    acceptance_criteria:
      - Cloudflare-backed invite email provider can be configured without hardcoded secrets.
      - Delivery state distinguishes delivered, failed, pending, and manual fallback.
      - Manual-link fallback remains available and truthful.
    tasks:
      - T029
      - T030
      - T031
      - T032
      - T033
      - T034
    implementation:
      - backend/app/api/routes.py
      - backend/app/api/schemas.py
      - backend/app/application/services/web_preview_invite_service.py
      - backend/app/infrastructure/config/settings.py
      - docs/web-preview-email-ses.md
      - deploy/cloudflare-email-endpoint/README.md
      - deploy/cloudflare-email-endpoint/worker/local_test.mjs
      - deploy/cloudflare-email-endpoint/worker/src/index.js
      - deploy/cloudflare-email-endpoint/wrangler.toml.example
      - scripts/validate_cloudflare_email_endpoint.sh
      - tests/test_cloudflare_email_endpoint_worker.py
      - tests/test_web_preview_invite_service.py
    evidence:
      - ".venv/bin/pytest -q tests/test_web_preview_invite_service.py"
      - "Invite email preflight reports ready, manual_fallback, and misconfigured states with redacted Cloudflare email token errors."
      - "scripts/validate_cloudflare_email_endpoint.sh validates the operator-provided Cloudflare Worker endpoint with Brevo free-compatible and Cloudflare Email Service provider modes."
      - "docs/web-preview-email-ses.md documents the Amazon SES SMTP path, free-tier constraints, sandbox, and production access checklist."
      - "Invite email delivery uses multipart text+HTML with an Activate account button, expiration copy, preview warning, and manual fallback URL."
  R-005-generator-release-gates:
    acceptance_criteria:
      - Generated release manifests, docs, validation scripts, and reviewer checklists include the hardened preview contract.
      - SAT Showroom regressions are covered by a fixture or golden generated project test.
      - Validation evidence is recorded in SDD traceability.
    tasks:
      - T035
      - T036
      - T037
      - T038
      - T039
    implementation:
